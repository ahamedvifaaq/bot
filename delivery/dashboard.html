<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Signal Engine</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --buy-color: #10b981;
            --sell-color: #ef4444;
            --accent: #3b82f6;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border-color: #475569;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        .card.buy::before { background-color: var(--buy-color); }
        .card.sell::before { background-color: var(--sell-color); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .pair {
            font-size: 1.25rem;
            font-weight: 700;
        }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.buy { background-color: rgba(16, 185, 129, 0.2); color: var(--buy-color); }
        .badge.sell { background-color: rgba(239, 68, 68, 0.2); color: var(--sell-color); }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .data-label { color: var(--text-muted); }
        .data-value { font-weight: 600; font-family: monospace; font-size: 1rem; }
        
        .probability-bar {
            margin-top: 1rem;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }
        .probability-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 3px;
        }
        
        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            align-items: center;
        }
        
    </style>
</head>
<body>

    <div class="top-bar">
        <div>
            <h1>Institutional Signal Engine</h1>
            <p class="subtitle">Real-time Liquidity & Order Block Detection Dashboard</p>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span class="status-dot" id="connection-dot"></span>
            <span id="connection-text" style="color: var(--text-muted); font-weight: 500;">Connecting...</span>
        </div>
    </div>

    <div class="container" id="signal-container">
        <!-- Cards generated by JS -->
    </div>

    <script>
        const container = document.getElementById('signal-container');
        const dot = document.getElementById('connection-dot');
        const statusText = document.getElementById('connection-text');
        
        // Connect WebSocket
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        
        // For local file testing without server
        let ws;
        
        function connect() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    dot.style.backgroundColor = '#10b981';
                    dot.style.boxShadow = '0 0 10px #10b981';
                    statusText.innerText = 'Live Data Connected';
                };
                
                ws.onmessage = (event) => {
                    const signal = JSON.parse(event.data);
                    renderSignal(signal);
                };
                
                ws.onclose = () => {
                    dot.style.backgroundColor = '#ef4444';
                    dot.style.boxShadow = '0 0 10px #ef4444';
                    statusText.innerText = 'Disconnected - Reconnecting...';
                    setTimeout(connect, 3000);
                };
            } catch (e) {
                console.warn("WebSocket not available. Displaying mock data.");
                dot.style.backgroundColor = '#f59e0b';
                statusText.innerText = 'Demo Mode (No Server)';
                mockData();
            }
        }
        
        function renderSignal(sig) {
            const card = document.createElement('div');
            const typeLower = sig.TYPE.toLowerCase();
            card.className = `card ${typeLower}`;
            
            // Generate content
            card.innerHTML = `
                <div class="card-header">
                    <div class="pair">${sig.PAIR} <span style="font-size:0.8rem; color:#94a3b8; font-weight:normal;">${sig.TIMEFRAME}</span></div>
                    <div class="badge ${typeLower}">${sig.TYPE}</div>
                </div>
                
                <div class="data-row">
                    <span class="data-label">Entry Price</span>
                    <span class="data-value">${sig.ENTRY}</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Stop Loss</span>
                    <span class="data-value" style="color:var(--sell-color)">${sig.STOP_LOSS}</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Take Profit 1/2/3</span>
                    <span class="data-value" style="color:var(--buy-color); font-size: 0.85rem;">${sig.TAKE_PROFIT}</span>
                </div>
                <div class="data-row" style="margin-top: 1rem;">
                    <span class="data-label">ML Prob. Score</span>
                    <span class="data-value" style="color:var(--accent)">${sig.PROBABILITY}</span>
                </div>
                <div class="probability-bar">
                    <div class="probability-fill" style="width: ${sig.PROBABILITY}"></div>
                </div>
                <div style="margin-top: 1rem; text-align: right; font-size: 0.75rem; color: var(--text-muted)">
                    Time: ${sig.TIMESTAMP}
                </div>
            `;
            
            container.prepend(card);
            
            // Keep max 20 cards
            if(container.children.length > 20) {
                container.lastElementChild.remove();
            }
        }
        
        function mockData() {
            setTimeout(() => {
                renderSignal({
                    PAIR: "BTCUSDT", TIMEFRAME: "15m", TYPE: "BUY", ENTRY: "43250.50",
                    STOP_LOSS: "42900.00", TAKE_PROFIT: "43600 / 43950 / 44300",
                    PROBABILITY: "82%", TIMESTAMP: new Date().toISOString()
                });
            }, 500);
            
            setTimeout(() => {
                renderSignal({
                    PAIR: "ETHUSDT", TIMEFRAME: "5m", TYPE: "SELL", ENTRY: "2250.00",
                    STOP_LOSS: "2265.00", TAKE_PROFIT: "2235 / 2220 / 2205",
                    PROBABILITY: "71%", TIMESTAMP: new Date().toISOString()
                });
            }, 2500);
        }

        // Start connection
        connect();
        
        // If loaded via file://, trigger mock data immediately
        if(window.location.protocol === 'file:') mockData();
        
    </script>
</body>
</html>
